name: Release Branchline

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build
        required: true
        type: string

concurrency:
  group: branchline-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-macos:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-latest
            runtime: osx-arm64
          - name: macOS Intel
            os: macos-15-intel
            runtime: osx-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish
        run: dotnet publish src/SourceGit.csproj -c Release -o build/Branchline -r ${{ matrix.runtime }}

      - name: Package app
        env:
          VERSION: ${{ inputs.tag || github.ref_name }}
          RUNTIME: ${{ matrix.runtime }}
        run: |
          VERSION="${VERSION#v}"
          export VERSION
          bash build/scripts/package.osx-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict build/Branchline.app

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: branchline.${{ matrix.runtime }}
          path: build/branchline_*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: branchline.*
          path: packages
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release create "$TAG" packages/* --title "Branchline ${TAG#v}" --generate-notes
